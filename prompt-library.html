// ─── Utility ────────────────────────────────────────────────────────
function getPromptsByDept(dept) {
  if (dept === 'all') return PROMPTS;
  return PROMPTS.filter(p => p.dept === dept);
}

function Stars({ rating, interactive, onRate, size = 'sm' }) {
  const [hover, setHover] = useState(0);
  const sz = size === 'sm' ? 'text-sm' : size === 'md' ? 'text-lg' : 'text-xl';
  return (
    <span className="inline-flex items-center gap-0.5">
      {[1,2,3,4,5].map(i => (
        <button
          key={i}
          className={`star-btn ${sz} ${interactive ? 'cursor-pointer' : 'cursor-default'}`}
          style={{ color: i <= (hover || Math.round(rating)) ? '#f59e0b' : '#d1d5db', background: 'none', border: 'none', padding: '1px' }}
          onMouseEnter={() => interactive && setHover(i)}
          onMouseLeave={() => interactive && setHover(0)}
          onClick={() => interactive && onRate && onRate(i)}
          disabled={!interactive}
        >★</button>
      ))}
    </span>
  );
}

function DeptTag({ dept }) {
  const c = DEPT_COLORS[dept] || { bg: '#f3f4f6', text: '#6b7280', border: '#e5e7eb' };
  const label = DEPARTMENTS.find(d => d.id === dept)?.name || dept;
  return (
    <span className="dept-tag inline-block px-2 py-0.5 rounded-md" style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}` }}>
      {label}
    </span>
  );
}

// ─── Toast ──────────────────────────────────────────────────────────
function Toast({ message, show }) {
  if (!show) return null;
  return (
    <div className="fixed bottom-6 right-6 z-[100] toast-enter">
      <div className="bg-gray-900 text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2">
        <span style={{ color: '#22c55e' }}>✓</span> {message}
      </div>
    </div>
  );
}

              <div className="mb-8">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-base" style={{ color: '#8B2332' }}>★</span>
                  <h2 className="font-serif text-lg font-semibold text-gray-900">Trending Prompts</h2>
                  <span className="text-xs text-gray-400 ml-1">Highest rated across all departments</span>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                  {featured.map(p => (
                    <button key={p.id} onClick={() => openPrompt(p)} className="prompt-card text-left bg-white rounded-xl border border-gray-200 p-4 hover:border-gray-300 transition-all">
                      <div className="flex items-center justify-between mb-2">
                        <DeptTag dept={p.dept} />
                        <span className="text-xs text-amber-500 font-semibold">{p.rating}★</span>
                      </div>
                      <h3 className="text-sm font-semibold text-gray-900 mb-1 leading-snug">{p.title}</h3>
                      <p className="text-xs text-gray-400 leading-relaxed line-clamp-2">{p.description}</p>
                      <div className="flex items-center justify-between mt-3 text-xs text-gray-400">
                        <span>{p.uses} uses</span>
                        <span>{p.contributor}</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Department heading */}
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <span className="text-base">{DEPARTMENTS.find(d => d.id === activeDept)?.icon}</span>
                <h2 className="font-serif text-lg font-semibold text-gray-900">
                  {DEPARTMENTS.find(d => d.id === activeDept)?.name}
                </h2>
                <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">{prompts.length}</span>
              </div>
              {search && <span className="text-xs text-gray-400">Showing results for "{search}"</span>}
            </div>

            {/* Grid / List */}
            {viewMode === 'grid' ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {prompts.map(p => (
                  <button key={p.id} onClick={() => openPrompt(p)} className="prompt-card text-left bg-white rounded-xl border border-gray-200 p-5 hover:border-gray-300 transition-all">
                    <div className="flex items-center justify-between mb-2.5">
                      <DeptTag dept={p.dept} />
                      <div className="flex items-center gap-1">
                        <Stars rating={p.rating} size="sm" />
                        <span className="text-xs text-gray-400 ml-0.5">{p.rating}</span>
                      </div>
                    </div>
                    <h3 className="text-[15px] font-semibold text-gray-900 mb-1.5 leading-snug">{p.title}</h3>
                    <p className="text-sm text-gray-500 leading-relaxed mb-3 line-clamp-2">{p.description}</p>
                    <div className="flex items-center justify-between text-xs text-gray-400">
                      <div className="flex items-center gap-3">
                        <span className="flex items-center gap-1"><span style={{ fontSize: '10px' }}>▶</span> {p.uses} uses</span>
                        <span>{p.ratingCount} ratings</span>
                      </div>
                      <span className="font-medium">{p.contributor}</span>
                    </div>
                  </button>
                ))}
              </div>
            ) : (
              <div className="space-y-1.5">
                {prompts.map(p => (
                  <button key={p.id} onClick={() => openPrompt(p)} className="prompt-card w-full text-left bg-white rounded-lg border border-gray-200 px-5 py-3 hover:border-gray-300 transition-all flex items-center gap-4">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-0.5">
                        <h3 className="text-sm font-semibold text-gray-900 truncate">{p.title}</h3>
                        <DeptTag dept={p.dept} />
                      </div>
                      <p className="text-xs text-gray-400 truncate">{p.description}</p>
                    </div>
                    <div className="flex items-center gap-5 text-xs text-gray-400 flex-shrink-0">
                      <Stars rating={p.rating} size="sm" />
                      <span>{p.uses} uses</span>
                      <span className="font-medium text-gray-500">{p.contributor}</span>
                    </div>
                  </button>
                ))}
              </div>
            )}

            {prompts.length === 0 && (
              <div className="text-center py-16">
                <div className="text-4xl mb-3 opacity-30">⊘</div>
                <p className="text-gray-400 text-sm">No prompts found{search ? ` for "${search}"` : ' in this category'}.</p>
                <button onClick={openAdd} className="mt-3 text-sm font-medium underline" style={{ color: '#8B2332' }}>Submit the first one</button>
              </div>
            )}
          </div>
        </div>
      </main>

      {/* Slide Panel */}
      <PromptPanel prompt={selectedPrompt} open={panelOpen} onClose={() => setPanelOpen(false)} mode={panelMode} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
